spring.application.name=backend
# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Datasource H2 (ejemplo dev)
spring.datasource.url=jdbc:h2:mem:tcgstore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA (opcional)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.user.name=demo
spring.security.user.password=demo123

# JWT
jwt.secret=tcgstore-super-secret-key-minimum-256-bits-long-for-hmac
jwt.expiration=86400000

pokewallet.base-url=https://api.pokewallet.io
pokewallet.api-key=${POKEWALLET_API_KEY}